<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="역도 트레이너">
<meta name="theme-color" content="#1D9E75">
<title>역도 트레이너</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--g:#1D9E75;--gl:#E1F5EE;--gd:#0F6E56;--r:#E24B4A;--b:#378ADD;--bg:#f5f5f5;--card:#fff;--tx:#1a1a1a;--tx2:#666;--tx3:#999;--bd:rgba(0,0,0,0.12);--bd2:rgba(0,0,0,0.2);--sf:#f0f0f0;--ra:12px;--rs:8px;}
@media(prefers-color-scheme:dark){:root{--bg:#111;--card:#1e1e1e;--tx:#f0f0f0;--tx2:#aaa;--tx3:#666;--bd:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.2);--sf:#2a2a2a;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
.hdr{background:var(--g);color:#fff;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.hdr-title{font-size:17px;font-weight:600;}
.hdr-sub{font-size:11px;opacity:.8;margin-top:1px;}
.hdr-btn{background:rgba(255,255,255,.2);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;border:none;color:#fff;}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:.5px solid var(--bd);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;cursor:pointer;border:none;background:none;color:var(--tx3);font-size:10px;gap:3px;}
.ni i{font-size:22px;}
.ni.active{color:var(--g);}
.scroll{flex:1;overflow-y:auto;padding:14px 14px calc(70px + env(safe-area-inset-bottom));}
.screen{display:none;}.screen.active{display:block;}
.card{background:var(--card);border:.5px solid var(--bd);border-radius:var(--ra);padding:14px;margin-bottom:12px;}
.ct{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.ct i{font-size:16px;color:var(--g);}
/* day nav */
.dnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.dtitle{font-size:18px;font-weight:700;color:var(--tx);}
.dsub{font-size:12px;color:var(--tx2);margin-top:3px;}
.darr{display:flex;gap:8px;}
.abtn{width:34px;height:34px;border-radius:8px;border:.5px solid var(--bd2);background:var(--sf);font-size:18px;cursor:pointer;color:var(--tx2);display:flex;align-items:center;justify-content:center;}
/* ex card */
.exc{background:var(--card);border:.5px solid var(--bd);border-radius:var(--ra);padding:14px;margin-bottom:10px;}
.exc-acc{border-color:rgba(186,117,23,.3);background:rgba(186,117,23,.03);}
/* Volume banner */
.vol-banner{background:var(--card);border:.5px solid var(--bd);border-radius:var(--ra);padding:12px 14px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.vol-item{display:flex;flex-direction:column;gap:2px;flex:1;min-width:80px;}
.vol-label{font-size:10px;color:var(--tx2);}
.vol-value{font-size:17px;font-weight:700;color:var(--tx);}
.vol-unit{font-size:10px;color:var(--tx2);font-weight:400;}
.vol-bar-wrap{width:100%;margin-top:6px;}
.vol-bar-label{font-size:10px;color:var(--tx2);margin-bottom:3px;}
.vol-bar-track{height:6px;background:var(--sf);border-radius:3px;overflow:hidden;}
.vol-bar-fill{height:100%;border-radius:3px;transition:width .4s;}
.vol-status{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.exn{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:2px;}
.exd{font-size:11px;color:var(--b);margin-bottom:6px;font-style:italic;}
.exm{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.wchip{background:var(--gl);color:var(--gd);border-radius:6px;padding:4px 10px;font-size:13px;font-weight:700;}
@media(prefers-color-scheme:dark){.wchip{background:#0F6E56;color:#9FE1CB;}}
.epct{font-size:11px;color:var(--tx2);}
.srow{display:flex;gap:6px;flex-wrap:wrap;}
.sbtn{width:40px;height:40px;border-radius:8px;border:.5px solid var(--bd2);background:var(--sf);font-size:12px;font-weight:600;cursor:pointer;color:var(--tx2);}
.sbtn.done{background:var(--g);border-color:var(--g);color:#fff;}
.sbtn.failed{background:var(--r);border-color:var(--r);color:#fff;}
/* timer */
.tsec{background:var(--card);border:.5px solid var(--bd);border-radius:var(--ra);padding:20px 16px;margin-top:10px;text-align:center;}
.rwrap{position:relative;width:100px;height:100px;margin:0 auto 12px;}
.rwrap svg{transform:rotate(-90deg);}
.rcenter{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:var(--tx);}
.tpre{display:flex;gap:6px;justify-content:center;margin-bottom:12px;}
.pbtn{padding:6px 12px;border:.5px solid var(--bd2);border-radius:6px;background:var(--sf);font-size:12px;cursor:pointer;color:var(--tx2);}
.tadj{display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:14px;}
.adjb{width:36px;height:36px;border-radius:50%;border:.5px solid var(--bd2);background:var(--sf);font-size:20px;cursor:pointer;color:var(--tx);}
.tbts{display:flex;gap:10px;justify-content:center;}
.tbtn{padding:10px 18px;border-radius:var(--rs);font-size:14px;cursor:pointer;border:.5px solid var(--bd2);background:var(--sf);color:var(--tx);font-weight:500;}
.tbtn.p{background:var(--g);border-color:var(--g);color:#fff;}
/* inputs */
.prow{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.plbl{font-size:12px;color:var(--tx2);width:120px;flex-shrink:0;}
.pinp{flex:1;height:36px;border:.5px solid var(--bd2);border-radius:6px;padding:0 10px;font-size:14px;background:var(--sf);color:var(--tx);}
.punit{font-size:12px;color:var(--tx2);width:24px;}
.gbtn{width:100%;padding:12px;border-radius:var(--rs);border:none;background:var(--g);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;}
.ghostb{width:100%;padding:10px;border-radius:var(--rs);border:.5px solid var(--bd2);background:var(--sf);color:var(--tx);font-size:13px;cursor:pointer;margin-top:8px;}
/* week tabs */
.wtabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.wtab{padding:6px 12px;border-radius:6px;border:.5px solid var(--bd2);background:var(--sf);font-size:12px;cursor:pointer;white-space:nowrap;color:var(--tx2);flex-shrink:0;}
.wtab.active{background:var(--g);border-color:var(--g);color:#fff;}
.pnote{font-size:12px;color:var(--tx2);background:var(--sf);border-radius:6px;padding:8px 10px;margin-bottom:12px;line-height:1.5;}
.pdcard{background:var(--card);border:.5px solid var(--bd);border-radius:var(--ra);padding:14px;margin-bottom:10px;}
.pdtitle{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:10px;}
.pexr{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:.5px solid var(--bd);}
.pexr:last-child{border-bottom:none;}
.pexn{font-size:13px;color:var(--tx);}
.pexnote{font-size:10px;color:var(--b);margin-top:2px;}
.pexrv{text-align:right;font-size:11px;color:var(--tx2);line-height:1.6;}
.pexrv b{font-size:13px;color:var(--g);font-weight:700;}
/* graph */
.frow{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.fbtn{padding:5px 10px;border-radius:6px;border:.5px solid var(--bd2);background:var(--sf);font-size:11px;cursor:pointer;white-space:nowrap;color:var(--tx2);flex-shrink:0;}
.fbtn.active{background:var(--g);border-color:var(--g);color:#fff;}
.hrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--bd);}
.hrow:last-child{border-bottom:none;}
.hex{font-size:13px;font-weight:600;color:var(--tx);}
.hdate{font-size:11px;color:var(--tx2);margin-top:2px;}
.hwt{font-size:16px;font-weight:700;color:var(--g);}
.delbtn{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:18px;padding:4px 8px;}
/* install */
.istep{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:.5px solid var(--bd);}
.istep:last-child{border-bottom:none;}
.inum{width:24px;height:24px;border-radius:50%;background:var(--g);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.itxt{font-size:13px;color:var(--tx);line-height:1.5;}
.itxt b{color:var(--g);}
/* toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
/* lang toggle */
.ltog{display:flex;border:.5px solid var(--bd2);border-radius:8px;overflow:hidden;margin-bottom:4px;}
.lbtn{flex:1;padding:10px;border:none;background:var(--sf);color:var(--tx2);font-size:14px;cursor:pointer;font-weight:500;}
.lbtn.active{background:var(--g);color:#fff;}
/* calendar */
.chdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cmon{font-size:16px;font-weight:700;color:var(--tx);}
.cnav{width:32px;height:32px;border-radius:8px;border:.5px solid var(--bd2);background:var(--sf);cursor:pointer;color:var(--tx2);font-size:16px;display:flex;align-items:center;justify-content:center;}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
.cdow{font-size:10px;color:var(--tx3);text-align:center;padding:4px 0;}
.cday{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;cursor:pointer;color:var(--tx2);position:relative;}
.cday.today{font-weight:700;color:var(--g);}
.cday.sel{background:var(--g);color:#fff!important;font-weight:700;}
.cday.hlog::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--g);}
.cday.sel.hlog::after{background:#fff;}
.cday.wday{background:var(--gl);}
@media(prefers-color-scheme:dark){.cday.wday{background:#0b4a38;}}
.cday.emp{pointer-events:none;}
.cdet{background:var(--card);border:.5px solid var(--bd);border-radius:var(--ra);padding:14px;margin-top:10px;}
.cexr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px solid var(--bd);}
.cexr:last-child{border-bottom:none;}
.cdot{display:inline-block;width:10px;height:10px;border-radius:50%;margin:1px;cursor:pointer;}
/* dow */
.dgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px;}
.dbtn{aspect-ratio:1;border-radius:8px;border:.5px solid var(--bd2);background:var(--sf);font-size:12px;cursor:pointer;color:var(--tx2);display:flex;align-items:center;justify-content:center;font-weight:500;}
.dbtn.sel{background:var(--g);border-color:var(--g);color:#fff;}
.dbtn.dis{opacity:.4;cursor:not-allowed;}
/* derive box */
.dbox{background:rgba(55,138,221,.07);border:.5px solid rgba(55,138,221,.25);border-radius:8px;padding:10px 12px;margin-bottom:12px;}
.dbtitle{font-size:12px;font-weight:600;color:var(--b);margin-bottom:6px;}
.drow{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;flex-wrap:wrap;gap:4px;}
.drow span:first-child{color:var(--tx2);}
select.pinp{appearance:none;}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-title" id="H_TITLE"><i class="ti ti-barbell"></i> 역도 트레이너</div>
    <div class="hdr-sub" id="H_SUB"></div>
  </div>
  <button class="hdr-btn" id="H_NEXT" onclick="cycleWeek()">다음 주</button>
</div>

<div class="scroll">
  <!-- TODAY -->
  <div class="screen active" id="screen-today">
    <div class="dnav">
      <div><div class="dtitle" id="D_TITLE">Day 1</div><div class="dsub" id="D_SUB"></div></div>
      <div class="darr">
        <button class="abtn" onclick="changeDay(-1)">&#8249;</button>
        <button class="abtn" onclick="changeDay(1)">&#8250;</button>
      </div>
    </div>
    <div id="VOL_BANNER"></div>
    <div id="EX_LIST"></div>
    <button class="ghostb" id="BTN_TIMER" onclick="toggleTimer()" style="margin-top:10px;"></button>
    <div class="tsec" id="TIMER_SEC" style="display:none;">
      <div class="rwrap">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="42" fill="none" stroke="var(--sf)" stroke-width="8"/>
          <circle id="RING" cx="50" cy="50" r="42" fill="none" stroke="#1D9E75" stroke-width="8" stroke-linecap="round" stroke-dasharray="263.9" stroke-dashoffset="0"/>
        </svg>
        <div class="rcenter" id="T_DISP">2:00</div>
      </div>
      <div style="font-size:12px;color:var(--tx2);margin-bottom:12px;" id="T_NEXT"></div>
      <div class="tpre">
        <button class="pbtn" onclick="setTV(60)">1min</button>
        <button class="pbtn" onclick="setTV(90)">1:30</button>
        <button class="pbtn" onclick="setTV(120)">2min</button>
        <button class="pbtn" onclick="setTV(180)">3min</button>
      </div>
      <div class="tadj">
        <button class="adjb" onclick="adjT(-15)">&#8722;</button>
        <span style="font-size:12px;color:var(--tx2);" id="T_ADJ"></span>
        <button class="adjb" onclick="adjT(15)">+</button>
      </div>
      <div class="tbts">
        <button class="tbtn" onclick="resetT()"><i class="ti ti-refresh"></i></button>
        <button class="tbtn p" id="T_BTN" onclick="toggleT()"></button>
        <button class="tbtn" id="T_CLOSE" onclick="closeTimer()"></button>
      </div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="screen" id="screen-cal">
    <div class="card">
      <div class="chdr">
        <button class="cnav" onclick="calMv(-1)">&#8249;</button>
        <div class="cmon" id="CAL_MON"></div>
        <button class="cnav" onclick="calMv(1)">&#8250;</button>
      </div>
      <div class="cgrid" id="CAL_DOW"></div>
      <div class="cgrid" id="CAL_DAYS"></div>
    </div>
    <div class="cdet" id="CAL_DET" style="display:none;"></div>
  </div>

  <!-- PROGRAM -->
  <div class="screen" id="screen-program">
    <div class="wtabs" id="WEEK_TABS"></div>
    <div class="pnote" id="PROG_NOTE"></div>
    <div id="PROG_LIST"></div>
  </div>

  <!-- SETTINGS -->
  <div class="screen" id="screen-pr">
    <div class="card">
      <div class="ct"><i class="ti ti-language"></i> <span id="S_LANG"></span></div>
      <div class="ltog">
        <button class="lbtn" id="LBTN_KO" onclick="setLang('ko')">한국어</button>
        <button class="lbtn" id="LBTN_EN" onclick="setLang('en')">English</button>
      </div>
    </div>
    <div class="card">
      <div class="ct"><i class="ti ti-trophy"></i> <span id="S_PR"></span></div>
      <div id="PR_INPUTS"></div>
      <div class="dbox">
        <div class="dbtitle" id="DRV_TITLE"></div>
        <div id="DRV_ROWS"></div>
      </div>
      <button class="gbtn" id="BTN_SAVE_PR" onclick="savePRs()"></button>
    </div>
    <div class="card">
      <div class="ct"><i class="ti ti-trending-up"></i> <span id="S_PROG"></span></div>
      <div class="prow">
        <span class="plbl" id="S_RATE_LBL"></span>
        <input class="pinp" id="PROG_RATE" type="number" value="2.5" step="0.5" min="0.5" max="5">
        <span class="punit">%</span>
      </div>
      <div style="font-size:12px;color:var(--tx2);line-height:1.6;" id="S_PROG_DESC"></div>
    </div>
    <div class="card">
      <div class="ct"><i class="ti ti-calendar-week"></i> <span id="S_DOW"></span></div>
      <div class="dgrid" id="DOW_GRID"></div>
      <div style="font-size:11px;color:var(--tx2);margin-bottom:10px;" id="DOW_HINT"></div>
      <button class="gbtn" id="BTN_SAVE_DOW" onclick="saveDow()"></button>
    </div>
    <div class="card">
      <div class="ct"><i class="ti ti-download"></i> <span id="S_DATA"></span></div>
      <button class="ghostb" id="BTN_EXP" onclick="exportData()"></button>
      <button class="ghostb" id="BTN_IMP" onclick="document.getElementById('IMP_FILE').click()"></button>
      <button class="ghostb" onclick="confirmResetAll()" style="color:var(--r);border-color:rgba(226,75,74,.4);" id="BTN_RESET_ALL"></button>
      <input type="file" id="IMP_FILE" accept=".json" style="display:none;" onchange="importData(event)">
    </div>
    <div class="card">
      <div class="ct"><i class="ti ti-device-mobile"></i> <span id="S_INST"></span></div>
      <div style="font-size:13px;font-weight:600;color:var(--tx);margin-bottom:8px;">iPhone (Safari)</div>
      <div class="istep"><div class="inum">1</div><div class="itxt" id="IOS1"></div></div>
      <div class="istep"><div class="inum">2</div><div class="itxt" id="IOS2"></div></div>
      <div style="font-size:13px;font-weight:600;color:var(--tx);margin:12px 0 8px;">Android (Chrome)</div>
      <div class="istep"><div class="inum">1</div><div class="itxt" id="AND1"></div></div>
      <div class="istep"><div class="inum">2</div><div class="itxt" id="AND2"></div></div>
    </div>
  </div>

  <!-- GRAPH -->
  <div class="screen" id="screen-graph">
    <div class="frow" id="G_FILTERS"></div>
    <div class="card" style="padding:14px 10px;">
      <div style="position:relative;width:100%;height:220px;">
        <canvas id="G_CHART" role="img" aria-label="weight progress chart"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="ct"><i class="ti ti-plus"></i> <span id="G_ADD"></span></div>
      <div class="prow"><span class="plbl" id="G_EX_L"></span>
        <select class="pinp" id="LOG_EX"></select>
      </div>
      <div class="prow"><span class="plbl" id="G_WT_L"></span>
        <input class="pinp" id="LOG_WT" type="number" placeholder="85" step="0.5">
        <span class="punit">kg</span>
      </div>
      <div class="prow"><span class="plbl" id="G_DT_L"></span>
        <input class="pinp" id="LOG_DT" type="date">
      </div>
      <button class="gbtn" id="BTN_LOG" onclick="addLog()"></button>
    </div>
    <div class="card">
      <div class="ct"><i class="ti ti-history"></i> <span id="G_HIST"></span></div>
      <div id="HIST_LIST"></div>
    </div>
  </div>
</div>

<div class="bnav">
  <button class="ni active" id="nav-today" onclick="sw('today')"><i class="ti ti-clipboard-list"></i><span id="N_TODAY"></span></button>
  <button class="ni" id="nav-cal" onclick="sw('cal')"><i class="ti ti-calendar"></i><span id="N_CAL"></span></button>
  <button class="ni" id="nav-graph" onclick="sw('graph')"><i class="ti ti-chart-line"></i><span id="N_GRAPH"></span></button>
  <button class="ni" id="nav-program" onclick="sw('program')"><i class="ti ti-list"></i><span id="N_PROG"></span></button>
  <button class="ni" id="nav-pr" onclick="sw('pr')"><i class="ti ti-settings"></i><span id="N_SET"></span></button>
</div>
<div class="toast" id="TOAST"></div>

<script>
// ===== DATA =====
var EX_DEFS = [
  // Day 1 - BIG: Snatch focus (Classic lifts + Squat + Pull)
  // Est. ~90-100 min main work
  [
    {prKey:'snatch',     pct:0.72, sets:5, reps:'3',   rest:180, drv:null,     acc:false},
    {prKey:'snatch',     pct:0.88, sets:4, reps:'2',   rest:150, drv:{fromKey:'snatch',fromPct:88,label:'hangsnatch'}, acc:false},
    {prKey:'snatchpull', pct:0.90, sets:4, reps:'3',   rest:150, drv:null,     acc:false},
    {prKey:'squat',      pct:0.80, sets:4, reps:'4',   rest:180, drv:null,     acc:false},

// ===== HELPERS =====
function L(){return LNG[lang];}
function getPR(k){return prs[k]||DEFAULTS[k]||80;}
function calcW(ex,wk){
  if(ex.prKey==='none'||ex.pct===0) return 0;
  var basePR;
  if(ex.drv){
    basePR = Math.round(getPR(ex.drv.fromKey)*ex.drv.fromPct/100/2.5)*2.5;
  } else {
    basePR = getPR(ex.prKey);
  }
  var mult = 1 + wk*(progRate/100);
  return Math.round(basePR*ex.pct*mult/2.5)*2.5;
}
function isBodyweight(ex){ return ex.prKey==='none'||ex.pct===0; }
function isAccessory(ex){ return ex.acc===true; }
function getWeekMult(i){return 1+i*(progRate/100);}
function toast(m){var t=document.getElementById('TOAST');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function dStr(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function todayStr(){var n=new Date();return dStr(n.getFullYear(),n.getMonth(),n.getDate());}
function setKey(ds,di,ei,si){return ds+'-'+di+'-'+ei+'-'+si;}
function dateWorkoutDay(date){var d=date.getDay();var i=wDows.indexOf(d);return i===-1?null:i;}
function hasLog(ds){return Object.keys(setStates).some(function(k){return k.indexOf(ds)===0&&(setStates[k]==='d'||setStates[k]==='f');});}

// Prilepin chart: optimal rep ranges per intensity zone for Olympic lifts
// Zone: [minPct, maxPct, repsPerSet_opt, totalReps_min, totalReps_opt, totalReps_max]
var PRILEPIN = [
  [0.55, 0.65, 6, 18, 24, 30],
  [0.70, 0.75, 6, 12, 18, 24],
  [0.80, 0.85, 4, 10, 15, 20],
  [0.90, 1.00, 2,  4,  7, 10]
];
function getPrilepinZone(pct){
  for(var i=0;i<PRILEPIN.length;i++){
    if(pct>=PRILEPIN[i][0]&&pct<=PRILEPIN[i][1]) return PRILEPIN[i];
  }
  return null;
}
function calcDayVolume(dayIdx, weekIdx){
  var totalKg=0, totalReps=0;
  var snatchKg=0, snatchReps=0;
  var cjKg=0, cjReps=0;
  var prilepinReps=0, prilepinMin=0, prilepinMax=0;
  EX_DEFS[dayIdx].forEach(function(ex){
    if(isBodyweight(ex)||ex.acc) return;
    var w=calcW(ex,weekIdx);
    var reps=parseInt(ex.reps)||1;
    var vol=w*reps*ex.sets;
    totalKg+=vol; totalReps+=reps*ex.sets;
    // Olympic lifts only for Prilepin
    if(ex.prKey==='snatch'||ex.prKey==='snatchpull'){
      snatchKg+=vol; snatchReps+=reps*ex.sets;
      var zone=getPrilepinZone(ex.pct*(1+(weekIdx*(progRate/100))));
      if(zone){prilepinReps+=reps*ex.sets;prilepinMin+=zone[3];prilepinMax+=zone[5];}
    }
    if(ex.prKey==='cleanjerk'){
      cjKg+=vol; cjReps+=reps*ex.sets;
    }
  });
  return {totalKg:Math.round(totalKg),totalReps:totalReps,snatchKg:Math.round(snatchKg),snatchReps:snatchReps,cjKg:Math.round(cjKg),cjReps:cjReps,prilepinReps:prilepinReps,prilepinMin:prilepinMin,prilepinMax:prilepinMax};
}

function renderToday(){

      drvHtml='<div class="exd">= '+l.exNames[ex.drv.fromKey]+' PR '+basePR+'kg × '+ex.drv.fromPct+'% → '+derived+'kg</div>';
    }

    var accBadge=acc?'<span style="font-size:10px;background:rgba(186,117,23,.15);color:#BA7517;border-radius:4px;padding:2px 6px;margin-left:6px;">'+(lang==='ko'?'보조':'ACC')+'</span>':'';
    var chipHtml=bw
      ?'<span class="wchip" style="background:var(--sf);color:var(--tx2);">'+(lang==='ko'?'맨몸':'BW')+'</span>'
      :'<span class="wchip">'+w+' kg</span>';
    var repsDisp=ex.reps==='0'?('30s'):ex.reps;

    var srow=document.createElement('div');
    srow.className='srow';

    for(var s=0;s<ex.sets;s++){
      var k=setKey(ds,curDay,ei,s);
      var st=setStates[k]||'p';
      var btn=document.createElement('button');
      btn.className='sbtn'+(st==='d'?' done':st==='f'?' failed':'');
      btn.textContent=s+1;
      btn.dataset.ds=ds;
      btn.dataset.di=curDay;
      btn.dataset.ei=ei;
      btn.dataset.si=s;
      btn.dataset.rest=ex.rest;
      btn.addEventListener('click', function(){
        tapSet(this.dataset.ds, parseInt(this.dataset.di), parseInt(this.dataset.ei), parseInt(this.dataset.si), parseInt(this.dataset.rest));
      });
      srow.appendChild(btn);
    }

    div.innerHTML='<div class="exn">'+exName+accBadge+'</div>'+drvHtml+
      '<div class="exm">'+chipHtml+'<span class="epct">'+ex.sets+'×'+repsDisp+(bw?'':' · '+Math.round(ex.pct*100)+'%')+'</span></div>';
    div.appendChild(srow);
    list.appendChild(div);
  });

}
function tapSet(ds,di,ei,si,rest){
  var k=setKey(ds,di,ei,si);
  var c=setStates[k]||'p';
  setStates[k]=c==='p'?'d':c==='d'?'f':'p';
  lset('sets',setStates);
  if(ds===todayStr())renderToday();
  if(document.getElementById('screen-cal').classList.contains('active'))renderCalDet(ds);
  if(setStates[k]==='d')openTimer(rest);
}

function confirmResetDay(){

// ===== TIMER =====
function openTimer(s){tTotal=s;tLeft=s;tRun=false;clearInterval(tInt);updTDisp();document.getElementById('TIMER_SEC').style.display='block';tOpen=true;document.getElementById('T_BTN').textContent='▶ Start';document.getElementById('TIMER_SEC').scrollIntoView({behavior:'smooth',block:'nearest'});}
function toggleTimer(){if(!tOpen)openTimer(120);else closeTimer();}
function closeTimer(){clearInterval(tInt);tRun=false;document.getElementById('TIMER_SEC').style.display='none';tOpen=false;}
function setTV(s){tTotal=s;tLeft=s;clearInterval(tInt);tRun=false;document.getElementById('T_BTN').textContent='▶ Start';updTDisp();}
function adjT(s){tLeft=Math.max(5,tLeft+s);tTotal=Math.max(tTotal,tLeft);updTDisp();}
function resetT(){tLeft=tTotal;clearInterval(tInt);tRun=false;document.getElementById('T_BTN').textContent='▶ Start';updTDisp();}
function toggleT(){
  if(tRun){clearInterval(tInt);tRun=false;document.getElementById('T_BTN').textContent='▶ Start';}
  else{
    if(tLeft<=0){resetT();return;}
    tRun=true;document.getElementById('T_BTN').textContent='⏸ Pause';
    tInt=setInterval(function(){
      tLeft--;
      if(tLeft<=0){tLeft=0;clearInterval(tInt);tRun=false;document.getElementById('T_BTN').textContent='▶ Start';}
      updTDisp();
    },1000);
  }
}
function updTDisp(){
  var m=Math.floor(tLeft/60),s=tLeft%60;
  document.getElementById('T_DISP').textContent=m+':'+(s<10?'0':'')+s;
  var c=263.9,o=c-(c*(tLeft/Math.max(tTotal,1)));
  document.getElementById('RING').style.strokeDashoffset=o;
}

function renderCalDet(ds,diOvr){
  var l=L();
  var det=document.getElementById('CAL_DET');
  var date=new Date(ds+'T00:00:00');
  var di=diOvr!=null?diOvr:dateWorkoutDay(date);
  if(di===null){
    var keys=Object.keys(setStates).filter(function(k){return k.indexOf(ds)===0;});
    if(keys.length>0) di=parseInt(keys[0].split('-')[3]);
  }
  if(di===null||di<0||di>3){
    det.style.display='block';
    det.innerHTML='<div style="font-size:14px;font-weight:700;color:var(--tx);margin-bottom:6px;">'+ds+'</div><div style="font-size:13px;color:var(--tx2);">'+l.restDay+'</div>';
    return;
  }
  var dd=l.dayDefs[di];
  var dowN=l.dowNames[date.getDay()];
  var tot=0,done=0;
  EX_DEFS[di].forEach(function(ex,ei){
    for(var s=0;s<ex.sets;s++){tot++;if(setStates[setKey(ds,di,ei,s)]==='d')done++;}
  });

  det.style.display='block';
  det.innerHTML=
    '<div style="font-size:14px;font-weight:700;color:var(--tx);margin-bottom:10px;"><i class="ti ti-calendar-event" style="color:var(--g)"></i> '+ds+' ('+dowN+') — '+dd.title+'</div>'+
    '<div style="display:flex;gap:8px;margin-bottom:10px;">'+
    '<div style="flex:1;background:var(--sf);border-radius:8px;padding:8px;text-align:center;"><div style="font-size:18px;font-weight:700;color:var(--g);">'+done+'</div><div style="font-size:10px;color:var(--tx2);">'+l.doneSets+'</div></div>'+
    '<div style="flex:1;background:var(--sf);border-radius:8px;padding:8px;text-align:center;"><div style="font-size:18px;font-weight:700;color:var(--tx);">'+(tot-done)+'</div><div style="font-size:10px;color:var(--tx2);">'+l.remaining+'</div></div>'+
    '<div style="flex:1;background:var(--sf);border-radius:8px;padding:8px;text-align:center;"><div style="font-size:18px;font-weight:700;color:var(--tx);">'+(tot>0?Math.round(done/tot*100):0)+'%</div><div style="font-size:10px;color:var(--tx2);">'+l.successRate+'</div></div>'+
    '</div><div style="font-size:11px;color:var(--tx3);margin-bottom:8px;">'+l.dotTip+'</div>';

  EX_DEFS[di].forEach(function(ex,ei){
    var nm=l.exNames2[di][ei];
    var w=calcW(ex,curWeek);
    var d2=0;
    var dotsEl=document.createElement('div');
    dotsEl.style.cssText='display:flex;flex-wrap:wrap;gap:2px;justify-content:flex-end;max-width:130px;';
    for(var s=0;s<ex.sets;s++){
      var k=setKey(ds,di,ei,s);
      var st=setStates[k]||'p';
      if(st==='d') d2++;
      var col=st==='d'?'#1D9E75':st==='f'?'#E24B4A':'var(--bd2)';
      var dotEl=document.createElement('span');
      dotEl.className='cdot';
      dotEl.style.background=col;
      (function(dds,ddi,dei,dsi,drest){
        dotEl.addEventListener('click',function(){ tapSet(dds,ddi,dei,dsi,drest); });
      })(ds,di,ei,s,ex.rest);
      dotsEl.appendChild(dotEl);
    }
    var rowEl=document.createElement('div');
    rowEl.className='cexr';
    rowEl.innerHTML='<div><div style="font-size:13px;font-weight:600;color:var(--tx);">'+nm+'</div><div style="font-size:11px;color:var(--tx2);">'+(isBodyweight(ex)?'BW':w+'kg')+' · '+d2+'/'+ex.sets+'</div></div>';
    rowEl.appendChild(dotsEl);

  });

function renderGraph(){

  var hist=document.getElementById('HIST_LIST');
  if(!filtered.length){hist.innerHTML='<div style="font-size:13px;color:var(--tx2);">'+l.noRec+'</div>';}
  else{
    hist.innerHTML=filtered.slice().reverse().slice(0,30).map(function(x){
      var idx=logs.indexOf(x);
      return '<div class="hrow"><div><div class="hex">'+(l.exNames[x.ex]||x.ex)+'</div><div class="hdate">'+x.date+'</div></div>'+
        '<div style="display:flex;align-items:center;gap:10px;"><span class="hwt">'+x.weight+'kg</span>'+
        '<button class="delbtn" onclick="delLog('+idx+')"><i class="ti ti-trash"></i></button></div></div>';
    }).join('');
  }
  var canvas=document.getElementById('G_CHART');
  if(chartInst){chartInst.destroy();chartInst=null;}
  var allDates=[].concat(logs.map(function(x){return x.date;})).filter(function(v,i,a){return a.indexOf(v)===i;}).sort();
  if(!allDates.length)return;
  var keys=curFilter==='all'?Object.keys(EX_COLORS):[curFilter];
  var datasets=keys.map(function(k){
    var data=logs.filter(function(x){return x.ex===k;}).sort(function(a,b){return a.date>b.date?1:-1;});
    if(!data.length)return null;
    return{label:l.exNames[k]||k,data:data.map(function(x){return{x:x.date,y:x.weight};}),borderColor:EX_COLORS[k]||'#888',backgroundColor:EX_COLORS[k]||'#888',borderWidth:2,pointRadius:5,tension:0.3,fill:false};
  }).filter(Boolean);
  chartInst=new Chart(canvas,{type:'line',data:{labels:allDates,datasets:datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:datasets.length>1,position:'bottom',labels:{font:{size:11},boxWidth:10,padding:8,color:'#888'}}},scales:{x:{ticks:{font:{size:10},color:'#888',maxTicksLimit:5,maxRotation:45},grid:{color:'rgba(128,128,128,0.1)'}},y:{ticks:{font:{size:10},color:'#888',callback:function(v){return v+'kg';}},grid:{color:'rgba(128,128,128,0.1)'}}}}});
}
function addLog(){
  var l=L();
  var ex=document.getElementById('LOG_EX').value;
  var w=parseFloat(document.getElementById('LOG_WT').value);
  var d=document.getElementById('LOG_DT').value;
  if(!ex||isNaN(w)||!d){toast('입력 확인');return;}
  logs.push({ex:ex,weight:Math.round(w*10)/10,date:d});lset('logs',logs);
  document.getElementById('LOG_WT').value='';
  if(w>(prs[ex]||0)){prs[ex]=w;lset('prs',prs);renderPRInputs();toast(l.newPR+' '+(l.exNames[ex]||ex)+' '+w+'kg');}

}
function delLog(idx){if(idx<0||idx>=logs.length)return;logs.splice(idx,1);lset('logs',logs);renderGraph();}

function exportData(){

  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});

  a.download='weightlifting_'+new Date().toISOString().slice(0,10)+'.json';a.click();

function importData(e){
  var file=e.target.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(d.prs)prs=d.prs;if(d.logs)logs=d.logs;
      if(d.progRate)progRate=d.progRate;if(d.curWeek!=null)curWeek=d.curWeek;
      if(d.setStates)setStates=d.setStates;if(d.wDows)wDows=d.wDows;
      if(d.lang)lang=d.lang;
      lset('prs',prs);lset('logs',logs);lset('rate',progRate);lset('week',curWeek);lset('sets',setStates);lset('dows',wDows);lset('lang',lang);
      applyLang();renderHeader();renderToday();renderPRInputs();
      toast(L().imported);
    }catch(err){toast(L().importErr);}
  };
  r.readAsText(file);
}

// ===== SCREEN SWITCH =====
function sw(name){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.ni').forEach(function(b){b.classList.remove('active');});
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='today'){var auto=detectTodayDayIdx();if(auto!==null)curDay=auto;renderToday();}
  if(name==='program')renderProgram();
  if(name==='pr')renderPRInputs();
  if(name==='cal')renderCal();
  if(name==='graph'){
    if(!document.getElementById('LOG_DT').value)document.getElementById('LOG_DT').value=new Date().toISOString().slice(0,10);
    renderGFilters();renderGraph();
  }
}

// ===== INIT =====
applyLang();
renderHeader();
renderToday();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="역도 트레이너">
<meta name="theme-color" content="#1D9E75">
<title>역도 트레이너</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;--red:#E24B4A;--blue:#378ADD;--amber:#BA7517;--purple:#7F77DD;--bg:#f5f5f5;--card:#ffffff;--text:#1a1a1a;--text2:#666;--text3:#999;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);--surface:#f0f0f0;--radius:12px;--radius-sm:8px;}
@media(prefers-color-scheme:dark){:root{--bg:#111;--card:#1e1e1e;--text:#f0f0f0;--text2:#aaa;--text3:#666;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);--surface:#2a2a2a;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
.header{background:var(--green);color:#fff;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.header-title{font-size:17px;font-weight:600;}
.header-sub{font-size:11px;opacity:0.8;margin-top:1px;}
.header-week{background:rgba(255,255,255,0.2);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;border:none;color:#fff;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:0.5px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:10px;gap:3px;}
.nav-item i{font-size:22px;}
.nav-item.active{color:var(--green);}
.scroll-area{flex:1;overflow-y:auto;padding:14px 14px calc(70px + env(safe-area-inset-bottom));}
.screen{display:none;}.screen.active{display:block;}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.card-title i{font-size:16px;color:var(--green);}
.day-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.day-info .day-title{font-size:18px;font-weight:700;color:var(--text);}
.day-info .day-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.day-arrows{display:flex;gap:8px;}
.arrow-btn{width:34px;height:34px;border-radius:8px;border:0.5px solid var(--border2);background:var(--surface);font-size:18px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;}
.ex-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.ex-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:2px;}
.ex-derive{font-size:11px;color:var(--blue);margin-bottom:6px;font-style:italic;}
.ex-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.weight-chip{background:var(--green-light);color:var(--green-dark);border-radius:6px;padding:4px 10px;font-size:13px;font-weight:700;}
@media(prefers-color-scheme:dark){.weight-chip{background:#0F6E56;color:#9FE1CB;}}
.ex-pct{font-size:11px;color:var(--text2);}
.sets-row{display:flex;gap:6px;flex-wrap:wrap;}
.set-btn{width:40px;height:40px;border-radius:8px;border:0.5px solid var(--border2);background:var(--surface);font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);}
.set-btn.done{background:var(--green);border-color:var(--green);color:#fff;}
.set-btn.failed{background:var(--red);border-color:var(--red);color:#fff;}
.timer-section{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:20px 16px;margin-top:10px;text-align:center;}
.ring-wrap{position:relative;width:100px;height:100px;margin:0 auto 12px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:var(--text);}
.timer-presets{display:flex;gap:6px;justify-content:center;margin-bottom:12px;}
.preset-btn{padding:6px 12px;border:0.5px solid var(--border2);border-radius:6px;background:var(--surface);font-size:12px;cursor:pointer;color:var(--text2);}
.timer-adj{display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:14px;}
.adj-btn{width:36px;height:36px;border-radius:50%;border:0.5px solid var(--border2);background:var(--surface);font-size:20px;cursor:pointer;color:var(--text);}
.timer-btns{display:flex;gap:10px;justify-content:center;}
.t-btn{padding:10px 18px;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;border:0.5px solid var(--border2);background:var(--surface);color:var(--text);font-weight:500;}
.t-btn.primary{background:var(--green);border-color:var(--green);color:#fff;}
.pr-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.pr-label{font-size:12px;color:var(--text2);width:120px;flex-shrink:0;}
.pr-input{flex:1;height:36px;border:0.5px solid var(--border2);border-radius:6px;padding:0 10px;font-size:14px;background:var(--surface);color:var(--text);}
.pr-unit{font-size:12px;color:var(--text2);width:24px;}
.pr-derived{font-size:12px;color:var(--blue);padding:4px 10px;background:rgba(55,138,221,0.08);border-radius:6px;margin-bottom:8px;line-height:1.5;}
.green-btn{width:100%;padding:12px;border-radius:var(--radius-sm);border:none;background:var(--green);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;}
.ghost-btn{width:100%;padding:10px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;margin-top:8px;}
.week-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.week-tab{padding:6px 12px;border-radius:6px;border:0.5px solid var(--border2);background:var(--surface);font-size:12px;cursor:pointer;white-space:nowrap;color:var(--text2);flex-shrink:0;}
.week-tab.active{background:var(--green);border-color:var(--green);color:#fff;}
.prog-note{font-size:12px;color:var(--text2);background:var(--surface);border-radius:6px;padding:8px 10px;margin-bottom:12px;line-height:1.5;}
.prog-day-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.prog-day-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;}
.prog-ex-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border);}
.prog-ex-row:last-child{border-bottom:none;}
.prog-ex-name{font-size:13px;color:var(--text);}
.prog-ex-right{text-align:right;font-size:11px;color:var(--text2);line-height:1.6;}
.prog-ex-right b{font-size:13px;color:var(--green);font-weight:700;}
.prog-ex-note{font-size:10px;color:var(--blue);}
.filter-row{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.filter-btn{padding:5px 10px;border-radius:6px;border:0.5px solid var(--border2);background:var(--surface);font-size:11px;cursor:pointer;white-space:nowrap;color:var(--text2);flex-shrink:0;}
.filter-btn.active{background:var(--green);border-color:var(--green);color:#fff;}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border);}
.history-row:last-child{border-bottom:none;}
.history-ex{font-size:13px;font-weight:600;color:var(--text);}
.history-date{font-size:11px;color:var(--text2);margin-top:2px;}
.history-weight{font-size:16px;font-weight:700;color:var(--green);}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:4px 8px;}
.install-step{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);}
.install-step:last-child{border-bottom:none;}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-text{font-size:13px;color:var(--text);line-height:1.5;}
.step-text b{color:var(--green);}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
select.pr-input{appearance:none;}
/* Lang toggle */
.lang-toggle{display:flex;border:0.5px solid var(--border2);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.lang-btn{flex:1;padding:10px;border:none;background:var(--surface);color:var(--text2);font-size:14px;cursor:pointer;font-weight:500;}
.lang-btn.active{background:var(--green);color:#fff;}
/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-month{font-size:16px;font-weight:700;color:var(--text);}
.cal-nav{width:32px;height:32px;border-radius:8px;border:0.5px solid var(--border2);background:var(--surface);cursor:pointer;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
.cal-dow{font-size:10px;color:var(--text3);text-align:center;padding:4px 0;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;cursor:pointer;color:var(--text2);position:relative;}
.cal-day.today{font-weight:700;color:var(--green);}
.cal-day.selected{background:var(--green);color:#fff!important;font-weight:700;}
.cal-day.has-workout::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--green);}
.cal-day.selected.has-workout::after{background:#fff;}
.cal-day.workout-day{background:var(--green-light);}
@media(prefers-color-scheme:dark){.cal-day.workout-day{background:#0b4a38;}}
.cal-day.empty{pointer-events:none;}
.cal-detail{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:10px;}
.cal-ex-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--border);}
.cal-ex-row:last-child{border-bottom:none;}
.cal-set-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin:1px;cursor:pointer;}
/* DOW selector */
.dow-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px;}
.dow-btn{aspect-ratio:1;border-radius:8px;border:0.5px solid var(--border2);background:var(--surface);font-size:12px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-weight:500;}
.dow-btn.selected{background:var(--green);border-color:var(--green);color:#fff;}
.dow-btn.disabled{opacity:0.4;cursor:not-allowed;}
/* Derive info box */
.derive-box{background:rgba(55,138,221,0.07);border:0.5px solid rgba(55,138,221,0.25);border-radius:8px;padding:10px 12px;margin-bottom:12px;}
.derive-box-title{font-size:12px;font-weight:600;color:var(--blue);margin-bottom:6px;}
.derive-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;}
.derive-row span:first-child{color:var(--text2);}
.derive-row span:last-child{color:var(--text);font-weight:600;}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title" id="h-title"><i class="ti ti-barbell"></i> 역도 트레이너</div>
    <div class="header-sub" id="header-sub"></div>
  </div>
  <button class="header-week" onclick="cycleWeek()" id="h-next-week">다음 주 →</button>
</div>
<div class="scroll-area">

  <!-- TODAY -->
  <div class="screen active" id="screen-today">
    <div class="day-nav">
      <div class="day-info">
        <div class="day-title" id="day-title">Day 1</div>
        <div class="day-sub" id="day-sub"></div>
      </div>
      <div class="day-arrows">
        <button class="arrow-btn" onclick="changeDay(-1)">‹</button>
        <button class="arrow-btn" onclick="changeDay(1)">›</button>
      </div>
    </div>
    <div id="exercises-list"></div>
    <button class="ghost-btn" onclick="toggleTimer()" id="btn-timer-open"><i class="ti ti-clock"></i></button>
    <div class="timer-section" id="timer-section" style="display:none;">
      <div class="ring-wrap">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="42" fill="none" stroke="var(--surface)" stroke-width="8"/>
          <circle id="ring-prog" cx="50" cy="50" r="42" fill="none" stroke="#1D9E75" stroke-width="8" stroke-linecap="round" stroke-dasharray="263.9" stroke-dashoffset="0"/>
        </svg>
        <div class="ring-center" id="timer-display">2:00</div>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px;" id="t-next-set"></div>
      <div class="timer-presets">
        <button class="preset-btn" onclick="setTimerVal(60)">1분</button>
        <button class="preset-btn" onclick="setTimerVal(90)">1:30</button>
        <button class="preset-btn" onclick="setTimerVal(120)">2분</button>
        <button class="preset-btn" onclick="setTimerVal(180)">3분</button>
      </div>
      <div class="timer-adj">
        <button class="adj-btn" onclick="adjustTimer(-15)">−</button>
        <span style="font-size:12px;color:var(--text2);" id="t-adj-label">15초 조절</span>
        <button class="adj-btn" onclick="adjustTimer(15)">+</button>
      </div>
      <div class="timer-btns">
        <button class="t-btn" onclick="resetTimer()"><i class="ti ti-refresh"></i></button>
        <button class="t-btn primary" id="start-btn" onclick="startPauseTimer()"><i class="ti ti-player-play"></i></button>
        <button class="t-btn" onclick="closeTimer()" id="t-close-btn"></button>
      </div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="screen" id="screen-cal">
    <div class="card">
      <div class="cal-header">
        <button class="cal-nav" onclick="calMove(-1)">‹</button>
        <div class="cal-month" id="cal-month-label"></div>
        <button class="cal-nav" onclick="calMove(1)">›</button>
      </div>
      <div class="cal-grid">
        <div class="cal-dow" id="dow0"></div><div class="cal-dow" id="dow1"></div><div class="cal-dow" id="dow2"></div>
        <div class="cal-dow" id="dow3"></div><div class="cal-dow" id="dow4"></div><div class="cal-dow" id="dow5"></div><div class="cal-dow" id="dow6"></div>
      </div>
      <div class="cal-grid" id="cal-days"></div>
    </div>
    <div class="cal-detail" id="cal-detail" style="display:none;"></div>
  </div>

  <!-- PROGRAM -->
  <div class="screen" id="screen-program">
    <div class="week-tabs" id="week-tabs"></div>
    <div class="prog-note" id="prog-note"></div>
    <div id="program-list"></div>
  </div>

  <!-- SETTINGS (PR + DOW + LANG) -->
  <div class="screen" id="screen-pr">
    <div class="card">
      <div class="card-title"><i class="ti ti-language"></i> <span id="s-lang-title"></span></div>
      <div class="lang-toggle">
        <button class="lang-btn" id="lang-ko" onclick="setLang('ko')">한국어</button>
        <button class="lang-btn" id="lang-en" onclick="setLang('en')">English</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-trophy"></i> <span id="s-pr-title"></span></div>
      <div id="pr-inputs"></div>
      <div class="derive-box" id="derive-box">
        <div class="derive-box-title" id="derive-title"></div>
        <div id="derive-rows"></div>
      </div>
      <button class="green-btn" onclick="savePRs()" id="btn-save-pr"></button>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-trending-up"></i> <span id="s-prog-title"></span></div>
      <div class="pr-row">
        <span class="pr-label" id="s-prog-label"></span>
        <input class="pr-input" id="prog-rate" type="number" value="2.5" step="0.5" min="0.5" max="5">
        <span class="pr-unit">%</span>
      </div>
      <div style="font-size:12px;color:var(--text2);line-height:1.6;" id="s-prog-desc"></div>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-calendar-week"></i> <span id="s-dow-title"></span></div>
      <div class="dow-grid" id="dow-grid"></div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:10px;" id="dow-hint"></div>
      <button class="green-btn" onclick="saveDow()" id="btn-save-dow"></button>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-download"></i> <span id="s-data-title"></span></div>
      <button class="ghost-btn" onclick="exportData()" id="btn-export"></button>
      <button class="ghost-btn" onclick="document.getElementById('import-file').click()" id="btn-import"></button>
      <input type="file" id="import-file" accept=".json" style="display:none;" onchange="importData(event)">
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-device-mobile"></i> <span id="s-install-title"></span></div>
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;">🍎 iPhone (Safari)</div>
      <div class="install-step"><div class="step-num">1</div><div class="step-text" id="s-ios1"></div></div>
      <div class="install-step"><div class="step-num">2</div><div class="step-text" id="s-ios2"></div></div>
      <div style="font-size:13px;font-weight:600;color:var(--text);margin:12px 0 8px;">🤖 Android (Chrome)</div>
      <div class="install-step"><div class="step-num">1</div><div class="step-text" id="s-and1"></div></div>
      <div class="install-step"><div class="step-num">2</div><div class="step-text" id="s-and2"></div></div>
    </div>
  </div>

  <!-- GRAPH -->
  <div class="screen" id="screen-graph">
    <div class="filter-row" id="graph-filters"></div>
    <div class="card" style="padding:14px 10px;">
      <div style="position:relative;width:100%;height:220px;">
        <canvas id="progressChart" role="img" aria-label="weight progress chart">중량 진행 기록 차트</canvas>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-plus"></i> <span id="g-add-title"></span></div>
      <div class="pr-row">
        <span class="pr-label" id="g-ex-label"></span>
        <select class="pr-input" id="log-ex"></select>
      </div>
      <div class="pr-row">
        <span class="pr-label" id="g-weight-label"></span>
        <input class="pr-input" id="log-weight" type="number" placeholder="85" step="0.5">
        <span class="pr-unit">kg</span>
      </div>
      <div class="pr-row">
        <span class="pr-label" id="g-date-label"></span>
        <input class="pr-input" id="log-date" type="date">
      </div>
      <button class="green-btn" onclick="addLog()" id="btn-add-log"></button>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-history"></i> <span id="g-hist-title"></span></div>
      <div id="history-list"></div>
    </div>
  </div>

</div>

<div class="bottom-nav">
  <button class="nav-item active" id="nav-today" onclick="switchScreen('today')">
    <i class="ti ti-clipboard-list"></i><span id="nav-today-label"></span>
  </button>
  <button class="nav-item" id="nav-cal" onclick="switchScreen('cal')">
    <i class="ti ti-calendar"></i><span id="nav-cal-label"></span>
  </button>
  <button class="nav-item" id="nav-graph" onclick="switchScreen('graph')">
    <i class="ti ti-chart-line"></i><span id="nav-graph-label"></span>
  </button>
  <button class="nav-item" id="nav-program" onclick="switchScreen('program')">
    <i class="ti ti-list"></i><span id="nav-prog-label"></span>
  </button>
  <button class="nav-item" id="nav-pr" onclick="switchScreen('pr')">
    <i class="ti ti-settings"></i><span id="nav-set-label"></span>
  </button>
</div>
<div class="toast" id="toast"></div>

<script>
// ── TRANSLATIONS ─────────────────────────────────────────────
const T={
  ko:{
    appTitle:'역도 트레이너', nextWeek:'다음 주 →',

const DEFAULTS={snatch:70,snatchpull:90,cleanjerk:90,deadlift:120,squat:110,frontsquat:90,press:55};

// Derived: hangsnatch = snatch PR × 88%, hangclean = cleanjerk PR × 88%
const DERIVE_RULES={
  hangsnatch:{fromKey:'snatch', pct:88},
  hangclean: {fromKey:'cleanjerk', pct:88},
};

function ls(k,d){try{const v=localStorage.getItem('wl_'+k);return v!=null?JSON.parse(v):d;}catch(e){return d;}}
function ss(k,v){try{localStorage.setItem('wl_'+k,JSON.stringify(v));}catch(e){}}

// ── PR HELPERS ────────────────────────────────────────────────
function getDirectPR(k){return prs[k]||DEFAULTS[k]||80;}
function getDerivedPR(k){
  if(DERIVE_RULES[k]){
    const r=DERIVE_RULES[k];
    return Math.round(getDirectPR(r.fromKey)*r.pct/100/2.5)*2.5;
  }
  return getDirectPR(k);
}
function calcW(ex,weekIdx){
  const rate=progRate/100;
  const mult=1+weekIdx*rate;
  const base=getDerivedPR(ex.prKey);
  return Math.round(base*ex.pct*mult/2.5)*2.5;
}
function getWeekMult(i){return 1+i*(progRate/100);}

// ── HEADER ────────────────────────────────────────────────────
function renderHeader(){
  const mult=getWeekMult(currentWeek);
  document.getElementById('header-sub').textContent=`${t().weekLabels[currentWeek]} · ${t().intensityOf} ${Math.round(mult*100)}%`;
}

// ── TODAY ─────────────────────────────────────────────────────
function renderToday(){
  const L=t();
  const dayDef=L.days[currentDay];
  document.getElementById('day-title').textContent=dayDef.title;
  const dow=workoutDows[currentDay];
  document.getElementById('day-sub').textContent=`${dayDef.sub}${dow!=null?' ('+L.dowNames[dow]+')':''}`;
  const list=document.getElementById('exercises-list');
  list.innerHTML='';
  const dStr=todayStr();
  EX_DEFS[currentDay].forEach((ex,ei)=>{
    const exName=L.exercises[currentDay][ei].name;
    const w=calcW(ex,currentWeek);
    const div=document.createElement('div');
    div.className='ex-card';
    // Derive note
    let deriveHtml='';
    if(ex.derivedFrom){
      const baseKey=ex.derivedFrom.prKey;
      const basePct=ex.derivedFrom.pct;
      const basePR=getDirectPR(baseKey);
      const baseExName=L.exLabels[baseKey]||baseKey;
      deriveHtml=`<div class="ex-derive"><i class="ti ti-link" style="font-size:11px;"></i> ${L.exDeriveNote(basePR,basePct)} (${baseExName} PR: ${basePR}kg)</div>`;
    }
    let sets='';
    for(let s=0;s<ex.sets;s++){
      const k=getSetKey(dStr,currentDay,ei,s);
      const st=setStates[k]||'p';
      sets+=`<button class="set-btn${st==='d'?' done':st==='f'?' failed':''}" onclick="tapSet('${dStr}',${currentDay},${ei},${s},${ex.rest})">${s+1}</button>`;
    }
    div.innerHTML=`<div class="ex-name">${exName}</div>${deriveHtml}
      <div class="ex-meta"><span class="weight-chip">${w} kg</span><span class="ex-pct">${ex.sets}×${ex.reps} · ${Math.round(ex.pct*100)}%</span></div>
      <div class="sets-row">${sets}</div>`;
    list.appendChild(div);
  });
}

function tapSet(dateS,dayIdx,ei,si,rest){
  const k=getSetKey(dateS,dayIdx,ei,si);
  const c=setStates[k]||'p';
  setStates[k]=c==='p'?'d':c==='d'?'f':'p';
  ss('sets',setStates);
  if(dateS===todayStr())renderToday();
  if(document.getElementById('screen-cal').classList.contains('active'))renderCalDetail(dateS);
  if(setStates[k]==='d')openTimerSection(rest);
}
function changeDay(d){currentDay=(currentDay+d+4)%4;ss('day',currentDay);renderToday();}
function cycleWeek(){currentWeek=(currentWeek+1)%4;ss('week',currentWeek);renderHeader();renderToday();toastMsg(t().weekLabels[currentWeek]);}
function dateStr(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function todayStr(){const n=new Date();return dateStr(n.getFullYear(),n.getMonth(),n.getDate());}
function getSetKey(ds,di,ei,si){return `${ds}-${di}-${ei}-${si}`;}

// ── TIMER ─────────────────────────────────────────────────────
function openTimerSection(s){timerTotal=s;timerLeft=s;timerRunning=false;clearInterval(timerInt);updateTimerDisp();document.getElementById('timer-section').style.display='block';timerOpen=true;document.getElementById('start-btn').innerHTML=`<i class="ti ti-player-play"></i> ${t().timerStart}`;document.getElementById('timer-section').scrollIntoView({behavior:'smooth',block:'nearest'});}
function toggleTimer(){if(!timerOpen)openTimerSection(120);else closeTimer();}
function closeTimer(){clearInterval(timerInt);timerRunning=false;document.getElementById('timer-section').style.display='none';timerOpen=false;}
function setTimerVal(s){timerTotal=s;timerLeft=s;clearInterval(timerInt);timerRunning=false;document.getElementById('start-btn').innerHTML=`<i class="ti ti-player-play"></i> ${t().timerStart}`;updateTimerDisp();}
function adjustTimer(s){timerLeft=Math.max(5,timerLeft+s);timerTotal=Math.max(timerTotal,timerLeft);updateTimerDisp();}
function resetTimer(){timerLeft=timerTotal;clearInterval(timerInt);timerRunning=false;document.getElementById('start-btn').innerHTML=`<i class="ti ti-player-play"></i> ${t().timerStart}`;updateTimerDisp();}
function startPauseTimer(){
  if(timerRunning){clearInterval(timerInt);timerRunning=false;document.getElementById('start-btn').innerHTML=`<i class="ti ti-player-play"></i> ${t().timerResume}`;}
  else{if(timerLeft<=0){resetTimer();return;}timerRunning=true;document.getElementById('start-btn').innerHTML=`<i class="ti ti-player-pause"></i> ${t().timerPause}`;timerInt=setInterval(()=>{timerLeft--;if(timerLeft<=0){timerLeft=0;clearInterval(timerInt);timerRunning=false;document.getElementById('start-btn').innerHTML=`<i class="ti ti-player-play"></i> ${t().timerStart}`;}updateTimerDisp();},1000);}
}
function updateTimerDisp(){
  const m=Math.floor(timerLeft/60),s=timerLeft%60;
  document.getElementById('timer-display').textContent=`${m}:${s.toString().padStart(2,'0')}`;
  const c=263.9,o=c-(c*(timerLeft/Math.max(timerTotal,1)));
  document.getElementById('ring-prog').style.strokeDashoffset=o;
}

function dateToWorkoutDay(date){const d=date.getDay();const i=workoutDows.indexOf(d);return i===-1?null:i;}
function dateHasLog(ds){return Object.keys(setStates).some(k=>k.startsWith(ds)&&(setStates[k]==='d'||setStates[k]==='f'));}
function calMove(d){calMonth+=d;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}renderCal();}
function renderCal(){
  const L=t();
  document.getElementById('cal-month-label').textContent=lang==='ko'?`${calYear}년 ${calMonth+1}월`:`${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][calMonth]} ${calYear}`;
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();
  const todayKey=dateStr(today.getFullYear(),today.getMonth(),today.getDate());
  let html='';
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=dateStr(calYear,calMonth,d);
    const date=new Date(calYear,calMonth,d);
    const dayIdx=dateToWorkoutDay(date);
    const isW=dayIdx!==null;
    const hasLog=dateHasLog(ds);
    const isToday=ds===todayKey;
    const isSel=ds===calSelectedDate;
    let cls='cal-day'+(isW?' workout-day':'')+(hasLog?' has-workout':'')+(isToday?' today':'')+(isSel?' selected':'');
    const lbl=isW?`<span style="font-size:8px;color:${isSel?'#fff':'var(--green)'};font-weight:600;">D${dayIdx+1}</span>`:'';
    html+=`<div class="${cls}" onclick="selectCalDate('${ds}',${dayIdx})"><div style="display:flex;flex-direction:column;align-items:center;gap:1px;"><span>${d}</span>${lbl}</div></div>`;
  }
  document.getElementById('cal-days').innerHTML=html;
  if(calSelectedDate)renderCalDetail(calSelectedDate);
}
function selectCalDate(ds,dayIdx){calSelectedDate=ds;renderCal();renderCalDetail(ds,dayIdx);}
function renderCalDetail(ds,dayIdxOverride){
  const L=t();
  const detail=document.getElementById('cal-detail');
  const date=new Date(ds+'T00:00:00');
  let dayIdx=dayIdxOverride!=null?dayIdxOverride:dateToWorkoutDay(date);
  if(dayIdx===null){
    const keys=Object.keys(setStates).filter(k=>k.startsWith(ds+'-'));
    if(keys.length>0)dayIdx=parseInt(keys[0].split('-')[3]);
  }
  if(dayIdx===null||dayIdx<0||dayIdx>3){
    detail.style.display='block';
    detail.innerHTML=`<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;">${ds}</div><div style="font-size:13px;color:var(--text2);">${L.restDay}</div>`;
    return;
  }
  const dayDef=L.days[dayIdx];
  const dowName=L.dowNames[date.getDay()];
  let totalSets=0,doneSets=0;
  EX_DEFS[dayIdx].forEach((ex,ei)=>{for(let s=0;s<ex.sets;s++){totalSets++;if(setStates[getSetKey(ds,dayIdx,ei,s)]==='d')doneSets++;}});
  let rows=EX_DEFS[dayIdx].map((ex,ei)=>{
    const exName=L.exercises[dayIdx][ei].name;
    const w=calcW(ex,currentWeek);
    const done=Array.from({length:ex.sets},(_,s)=>setStates[getSetKey(ds,dayIdx,ei,s)]==='d').filter(Boolean).length;
    let dots='';
    for(let s=0;s<ex.sets;s++){
      const k=getSetKey(ds,dayIdx,ei,s);
      const st=setStates[k]||'p';
      const col=st==='d'?'#1D9E75':st==='f'?'#E24B4A':'var(--border2)';
      dots+=`<span class="cal-set-dot" style="background:${col};" onclick="tapSet('${ds}',${dayIdx},${ei},${s},${ex.rest})"></span>`;
    }
    return `<div class="cal-ex-row"><div><div style="font-size:13px;font-weight:600;color:var(--text);">${exName}</div><div style="font-size:11px;color:var(--text2);">${w}kg · ${done}/${ex.sets}</div></div><div style="display:flex;flex-wrap:wrap;gap:2px;justify-content:flex-end;max-width:130px;">${dots}</div></div>`;
  }).join('');
  detail.style.display='block';
  detail.innerHTML=`<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;"><i class="ti ti-calendar-event" style="color:var(--green)"></i> ${ds} (${dowName}) — ${dayDef.title}</div>
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <div style="flex:1;background:var(--surface);border-radius:8px;padding:8px;text-align:center;"><div style="font-size:18px;font-weight:700;color:var(--green);">${doneSets}</div><div style="font-size:10px;color:var(--text2);">${L.doneSets}</div></div>
      <div style="flex:1;background:var(--surface);border-radius:8px;padding:8px;text-align:center;"><div style="font-size:18px;font-weight:700;color:var(--text);">${totalSets-doneSets}</div><div style="font-size:10px;color:var(--text2);">${L.remaining}</div></div>
      <div style="flex:1;background:var(--surface);border-radius:8px;padding:8px;text-align:center;"><div style="font-size:18px;font-weight:700;color:var(--text);">${totalSets>0?Math.round(doneSets/totalSets*100):0}%</div><div style="font-size:10px;color:var(--text2);">${L.successRate}</div></div>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:8px;">${L.dotTip}</div>${rows}`;
}

// ── DOW ───────────────────────────────────────────────────────
function renderDowGrid(){
  const L=t();
  document.getElementById('dow-grid').innerHTML=L.dowNames.map((n,i)=>{
    const sel=tempDows.includes(i);
    const disabled=!sel&&tempDows.length>=4;
    return `<button class="dow-btn${sel?' selected':''}${disabled?' disabled':''}" onclick="toggleDow(${i})">${n}</button>`;
  }).join('');
  const selNames=tempDows.slice().sort((a,b)=>a-b).map(d=>L.dowNames[d]).join(', ');
  document.getElementById('dow-hint').textContent=tempDows.length===0?L.minDow:L.dowHint(selNames,tempDows.length);
}
function toggleDow(i){
  const idx=tempDows.indexOf(i);
  if(idx!==-1)tempDows.splice(idx,1);
  else if(tempDows.length<4)tempDows.push(i);
  else{toastMsg(t().maxDow);return;}
  renderDowGrid();
}
function saveDow(){
  if(tempDows.length===0){toastMsg(t().minDow);return;}
  workoutDows=[...tempDows].sort((a,b)=>a-b);
  ss('dows',workoutDows);toastMsg(t().dowSaved);
  renderToday();renderCal();
}

// ── PR INPUTS ─────────────────────────────────────────────────
function renderPRInputs(){
  const L=t();
  document.getElementById('pr-inputs').innerHTML=DIRECT_PR_KEYS.map(k=>`
    <div class="pr-row">
      <span class="pr-label">${L.exLabels[k]||k}</span>
      <input class="pr-input" id="pr_${k}" type="number" value="${getDirectPR(k)}" step="2.5" min="20" oninput="updateDeriveBox()">
      <span class="pr-unit">kg</span>
    </div>`).join('');
  document.getElementById('prog-rate').value=progRate;
  tempDows=[...workoutDows];
  renderDowGrid();
  updateDeriveBox();
}
function updateDeriveBox(){
  const L=t();
  const snatchVal=parseFloat(document.getElementById('pr_snatch')?.value)||getDirectPR('snatch');
  const cjVal=parseFloat(document.getElementById('pr_cleanjerk')?.value)||getDirectPR('cleanjerk');
  document.getElementById('derive-title').textContent=L.deriveTitle;
  const hangSnatch=Math.round(snatchVal*0.88/2.5)*2.5;
  const hangClean=Math.round(cjVal*0.88/2.5)*2.5;
  document.getElementById('derive-rows').innerHTML=`
    <div class="derive-row"><span>${L.exLabels['hangsnatch']}</span><span>${L.exLabels['snatch']} ${snatchVal}kg × 88% = <b style="color:var(--blue)">${hangSnatch}kg</b></span></div>
    <div class="derive-row"><span>${L.exLabels['hangclean']}</span><span>${L.exLabels['cleanjerk']} ${cjVal}kg × 88% = <b style="color:var(--blue)">${hangClean}kg</b></span></div>`;
}
function savePRs(){
  DIRECT_PR_KEYS.forEach(k=>{const v=parseFloat(document.getElementById('pr_'+k)?.value);if(!isNaN(v))prs[k]=v;});
  progRate=parseFloat(document.getElementById('prog-rate').value)||2.5;
  ss('prs',prs);ss('rate',progRate);
  renderToday();renderHeader();updateDeriveBox();
  toastMsg(t().saved);
}

// ── PROGRAM ───────────────────────────────────────────────────
function renderProgram(){
  const L=t();
  document.getElementById('week-tabs').innerHTML=L.weekLabels.map((w,i)=>
    `<button class="week-tab${i===currentWeek?' active':''}" onclick="selectWeek(${i})">${w}</button>`).join('');
  const mult=getWeekMult(currentWeek);
  const dowStr=workoutDows.map(d=>L.dowNames[d]).join(', ');
  document.getElementById('prog-note').innerHTML=L.progNote(mult,progRate,dowStr);
  const list=document.getElementById('program-list');list.innerHTML='';
  L.days.forEach((dayDef,di)=>{
    const dow=workoutDows[di];
    const d=document.createElement('div');d.className='prog-day-card';
    let rows=EX_DEFS[di].map((ex,ei)=>{
      const exName=L.exercises[di][ei].name;
      const w=calcW(ex,currentWeek);
      const noteHtml=ex.derivedFrom?`<div class="prog-ex-note">${L.exDeriveNote(getDirectPR(ex.derivedFrom.prKey),ex.derivedFrom.pct)}</div>`:'';
      return `<div class="prog-ex-row"><div><span class="prog-ex-name">${exName}</span>${noteHtml}</div><div class="prog-ex-right">${ex.sets}×${ex.reps}<br><b>${w}kg</b></div></div>`;
    }).join('');
    d.innerHTML=`<div class="prog-day-title">${dayDef.title}${dow!=null?' ('+L.dowNames[dow]+')':''} — ${dayDef.sub}</div>${rows}`;
    list.appendChild(d);
  });
}
function selectWeek(i){currentWeek=i;ss('week',i);renderProgram();renderToday();renderHeader();}

// ── GRAPH ─────────────────────────────────────────────────────
function renderGraphFilters(){
  document.getElementById('graph-filters').innerHTML=t().graphFilters.map(f=>
    `<button class="filter-btn${f.key===currentFilter?' active':''}" onclick="setFilter('${f.key}')">${f.label}</button>`).join('');
}
function setFilter(k){currentFilter=k;renderGraphFilters();renderGraph();}
function renderGraph(){
  const L=t();
  const filtered=currentFilter==='all'?logs:logs.filter(l=>l.ex===currentFilter);
  const hist=document.getElementById('history-list');
  if(!filtered.length){hist.innerHTML=`<div style="font-size:13px;color:var(--text2);">${L.noRecordFilter}</div>`;}
  else{
    hist.innerHTML=[...filtered].reverse().slice(0,30).map(l=>`
      <div class="history-row">
        <div><div class="history-ex">${L.exLabels[l.ex]||l.ex}</div><div class="history-date">${l.date}</div></div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="history-weight">${l.weight}kg</span>
          <button class="del-btn" onclick="delLog(${logs.indexOf(l)})"><i class="ti ti-trash"></i></button>
        </div>
      </div>`).join('');
  }
  const canvas=document.getElementById('progressChart');
  if(chartInst){chartInst.destroy();chartInst=null;}
  const keys=currentFilter==='all'?Object.keys(EX_COLORS):[currentFilter];
  const allDates=[...new Set(logs.map(l=>l.date))].sort();
  if(!allDates.length)return;
  const datasets=keys.map(k=>{
    const data=logs.filter(l=>l.ex===k).sort((a,b)=>a.date.localeCompare(b.date));
    if(!data.length)return null;
    return{label:L.exLabels[k]||k,data:data.map(l=>({x:l.date,y:l.weight})),borderColor:EX_COLORS[k]||'#888',backgroundColor:EX_COLORS[k]||'#888',borderWidth:2,pointRadius:5,tension:0.3,fill:false};
  }).filter(Boolean);
  chartInst=new Chart(canvas,{type:'line',data:{labels:allDates,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:datasets.length>1,position:'bottom',labels:{font:{size:11},boxWidth:10,padding:8,color:'#888'}}},scales:{x:{ticks:{font:{size:10},color:'#888',maxTicksLimit:5,maxRotation:45},grid:{color:'rgba(128,128,128,0.1)'}},y:{ticks:{font:{size:10},color:'#888',callback:v=>v+'kg'},grid:{color:'rgba(128,128,128,0.1)'}}}}}});
}
function addLog(){
  const L=t();
  const ex=document.getElementById('log-ex').value;
  const w=parseFloat(document.getElementById('log-weight').value);
  const d=document.getElementById('log-date').value;
  if(!ex||isNaN(w)||!d){toastMsg(L.gAddTitle);return;}
  logs.push({ex,weight:Math.round(w*10)/10,date:d});ss('logs',logs);
  document.getElementById('log-weight').value='';
  if(w>(prs[ex]||0)){prs[ex]=w;ss('prs',prs);renderPRInputs();toastMsg(L.newPR(L.exLabels[ex]||ex,w));}
  else toastMsg(L.logAdded);
  renderGraph();
}
function delLog(idx){if(idx<0||idx>=logs.length)return;logs.splice(idx,1);ss('logs',logs);renderGraph();}

// ── DATA ──────────────────────────────────────────────────────
function exportData(){
  const data={prs,logs,progRate,currentWeek,setStates,workoutDows,lang,exportDate:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`weightlifting_${new Date().toISOString().slice(0,10)}.json`;a.click();
  toastMsg(t().exported);
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{try{
    const d=JSON.parse(ev.target.result);
    if(d.prs)prs=d.prs;if(d.logs)logs=d.logs;
    if(d.progRate)progRate=d.progRate;if(d.currentWeek!=null)currentWeek=d.currentWeek;
    if(d.setStates)setStates=d.setStates;if(d.workoutDows)workoutDows=d.workoutDows;
    if(d.lang)lang=d.lang;
    ss('prs',prs);ss('logs',logs);ss('rate',progRate);ss('week',currentWeek);ss('sets',setStates);ss('dows',workoutDows);ss('lang',lang);
    applyLang();renderHeader();renderToday();renderPRInputs();
    toastMsg(t().imported);
  }catch(err){toastMsg(t().importErr);}};
  r.readAsText(file);
}

// ── SCREEN SWITCH ─────────────────────────────────────────────
function switchScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='program')renderProgram();
  if(name==='pr')renderPRInputs();
  if(name==='cal')renderCal();
  if(name==='graph'){
    if(!document.getElementById('log-date').value)document.getElementById('log-date').value=new Date().toISOString().slice(0,10);
    renderGraphFilters();renderGraph();
  }
}

// ── INIT ──────────────────────────────────────────────────────
applyLang();
renderHeader();
renderToday();
</script>
</body>
</html>
